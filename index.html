<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ManhBan Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;color:#eee;padding:16px;max-width:400px;margin:auto}
.box{background:#1a1a2e;border-radius:16px;padding:20px}
h1{font-size:20px;text-align:center;margin-bottom:4px;color:#7c3aed}
.sub{text-align:center;font-size:12px;color:#888;margin-bottom:12px}
.bar{display:flex;justify-content:space-between;background:#16213e;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.on{color:#34d399}.off{color:#ef4444}
button{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;color:#fff}
button:active{opacity:.7}button:disabled{opacity:.4}
.b-blue{background:#2563eb}.b-red{background:#dc2626}.b-green{background:#059669}
.b-yellow{background:#d97706}.b-gray{background:#374151}
.hid{display:none!important}
.grp{display:flex;gap:6px}.grp button{flex:1}
.log{background:#0a0a1a;border-radius:10px;padding:10px;height:150px;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.6;margin-top:12px}
.log .i{color:#93c5fd}.log .ok{color:#34d399}.log .er{color:#f87171}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.card{background:#16213e;border-radius:8px;padding:10px;text-align:center}
.card .l{font-size:10px;color:#888}.card .v{font-size:18px;font-weight:700;margin-top:2px}
.card .v.s{font-size:12px}
.epd{background:#e8e4da;border-radius:10px;padding:14px;margin-bottom:12px;color:#1a1a1a;font-family:monospace;text-align:center}
.epd .t{font-size:36px;font-weight:700;letter-spacing:3px}
.epd .d{font-size:11px;margin-top:4px}.epd .l{font-size:10px;margin-top:2px;color:#666}
</style>
</head>
<body>
<div class="box">
<h1>ManhBan Clock</h1>
<p class="sub">Điều khiển đồng hồ E-Ink</p>
<div class="bar"><span id="st">Chưa kết nối</span><span id="sd" class="off">●</span></div>
<button id="bc" class="b-blue" onclick="conn()">🔗 Kết nối</button>
<div id="pn" class="hid">
  <div class="epd">
    <div class="t" id="epdT">14:35</div>
    <div class="d" id="epdD">30/06/2025  Thứ 2</div>
    <div class="l" id="epdL">Âm lịch ngày 15/5</div>
  </div>
  <div class="grid">
    <div class="card"><div class="l">Thiết bị</div><div class="v s" id="dn">---</div></div>
    <div class="card"><div class="l">Pin</div><div class="v" id="dv">--V</div></div>
    <div class="card"><div class="l">Giờ TB</div><div class="v" id="dt" style="font-size:13px">--:--:--</div></div>
    <div class="card"><div class="l">Giờ Web</div><div class="v" id="sw" style="font-size:13px">--:--:--</div></div>
  </div>
  <div class="grp">
    <button class="b-green" onclick="syn()">⏱ Đồng bộ</button>
    <button class="b-yellow" onclick="tog()">🔄 12/24h</button>
  </div>
  <button class="b-gray" onclick="cal()">📐 Hiệu chỉnh</button>
</div>
<div class="log" id="lg"></div>
</div>
<script>
function lg(m,t){const e=document.getElementById('lg')
  e.innerHTML+=`<div class="${t}">${m}</div>`;e.scrollTop=e.scrollHeight}
setInterval(()=>{document.getElementById('sw').textContent=new Date().toLocaleString()},1000)
let d,s,c,h,a,ok=!1

async function conn(){
  if(ok){dc();return}
  const b=document.getElementById('bc');b.disabled=!0;b.innerHTML='⏳ Đang kết nối...'
  try{
    d=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'DLG-CLOCK'}],optionalServices:[0xFF00]})
    d.ongattserverdisconnected=onDisc
    s=await d.gatt.connect();c=await s.getPrimaryService(0xFF00)
    h=await c.getCharacteristic(0xFF01);a=await c.getCharacteristic(0xFF02)
    document.getElementById('dn').textContent=d.name
    try{
      const v=await a.readValue();const vt=v.getUint16(0,!0)/1000
      document.getElementById('dv').textContent=vt.toFixed(2)+'V'
    }catch(e){}
    ok=!0;document.getElementById('st').textContent='Đã kết nối';document.getElementById('sd').className='on'
    document.getElementById('pn').classList.remove('hid')
    document.getElementById('bc').textContent='🔌 Ngắt';document.getElementById('bc').className='b-red'
    // Read device time
    try{
      const t=await h.readValue()
      const y=t.getUint16(0,!0),m=t.getUint8(2)+1,dd=t.getUint8(3),h2=t.getUint8(4),mi=t.getUint8(5),s2=t.getUint8(6)
      const w=t.getUint8(8),wds=['CN','2','3','4','5','6','7']
      document.getElementById('dt').textContent=y+'/'+String(m).padStart(2,'0')+'/'+String(dd).padStart(2,'0')+' '+String(h2).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':'+String(s2).padStart(2,'0')
      document.getElementById('epdT').textContent=String(h2).padStart(2,'0')+':'+String(mi).padStart(2,'0')
      document.getElementById('epdD').textContent=String(dd).padStart(2,'0')+'/'+String(m).padStart(2,'0')+'/'+y+'  Thứ '+(wds[w]||'?')
    }catch(e){}
    lg('Đã kết nối','ok')
  }catch(e){lg('Lỗi: '+e.message,'er');dc()}
  b.disabled=!1
}

async function syn(){
  const b=document.querySelector('.b-green');b.disabled=!0;b.innerHTML='⏳ Đang đồng bộ...'
  try{
    while(Date.now()%1000>50)await wait(20)
    const n=new Date();let lm=1,ld=1,ly=n.getFullYear()-2020
    try{
      const loc=n.toLocaleDateString('vi-VN-u-ca-chinese',{month:'numeric',day:'numeric'})
      const p=loc.replace('Tháng ','').split(',')[0].split('/')
      if(p.length>=2){lm=parseInt(p[0])||1;ld=parseInt(p[1])||1}
      ly=parseInt(n.toLocaleDateString('vi-VN-u-ca-chinese',{year:'numeric'}))-2020
    }catch(e){lm=n.getMonth()+1}
    const buf=new Uint8Array(12)
    buf[0]=0x91;buf[1]=n.getFullYear()&255;buf[2]=(n.getFullYear()>>8)&255
    buf[3]=n.getMonth();buf[4]=n.getDate();buf[5]=n.getHours()
    buf[6]=n.getMinutes();buf[7]=n.getSeconds();buf[8]=n.getDay()
    buf[9]=ly;buf[10]=lm-1;buf[11]=ld
    await h.writeValueWithResponse(buf)
    lg('Đồng bộ thành công!','ok')
  }catch(e){lg('Lỗi: '+e.message,'er')}
  b.disabled=!1;b.innerHTML='⏱ Đồng bộ'
}

async function tog(){
  try{await h.writeValueWithResponse(new Uint8Array([0x90]));lg('Đã chuyển 12h/24h','ok')}
  catch(e){lg('Lỗi: '+e.message,'er')}
}

async function cal(){
  const b=document.querySelector('.b-gray');b.disabled=!0
  try{
    const cur=await h.readValue(),lm=cur.getUint8(5),cm=cur.getInt32(7,!0)
    if(cm<2880){lg('Cần chờ >2 ngày sau đồng bộ!','er');b.disabled=!1;return}
    lg('Chờ nhảy phút...')
    let nm=lm;while(nm===lm){const t=await h.readValue();nm=t.getUint8(5);await wait(100)}
    const t2=await h.readValue(),dm=t2.getUint8(5),ds=t2.getUint8(6)
    const sys=new Date();let diff=(dm*60+ds)-(sys.getMinutes()*60+sys.getSeconds())
    if(diff>1800)diff-=3600;if(diff<-1800)diff+=3600
    await h.writeValueWithResponse(new Uint8Array([0x92,diff&255,(diff>>8)&255,0]))
    lg('Hiệu chỉnh xong (lệch '+diff+'s)','ok')
  }catch(e){lg('Lỗi: '+e.message,'er')}
  b.disabled=!1
}

function dc(){if(d&&d.gatt.connected)d.gatt.disconnect();onDisc()}
function onDisc(){
  d=null;s=null;c=null;h=null;a=null;ok=!1
  document.getElementById('st').textContent='Chưa kết nối';document.getElementById('sd').className='off'
  document.getElementById('pn').classList.add('hid')
  document.getElementById('bc').textContent='🔗 Kết nối';document.getElementById('bc').className='b-blue'
  lg('Đã ngắt')}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
lg('Nhấn Kết nối và chọn DLG-CLOCK để bắt đầu')
</script>
</body>
</html>
